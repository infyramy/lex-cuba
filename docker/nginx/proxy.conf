# ============================================================================
# Reverse Proxy — Routes subdomains to the correct service
# ============================================================================
# admin.{domain} → Admin SPA (port 80 on admin service)
# api.{domain}   → Laravel API (port 80 on api-web service)
# ============================================================================

# Admin subdomain → SPA
server {
    listen 80;
    server_name ~^admin\.;

    location / {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API subdomain → Laravel
server {
    listen 80;
    server_name ~^api\.;

    client_max_body_size 25M;

    location / {
        proxy_pass http://api-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Default — serve API (fallback for direct IP access)
server {
    listen 80 default_server;
    server_name _;

    location / {
        proxy_pass http://api-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
