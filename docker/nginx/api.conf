server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Max upload size
    client_max_body_size 25M;

    # CORS — handle at nginx level for reliability
    set $cors_origin "";
    if ($http_origin = "https://lex-admin.0w0.my") {
        set $cors_origin "https://lex-admin.0w0.my";
    }
    if ($http_origin = "http://localhost:5180") {
        set $cors_origin "http://localhost:5180";
    }
    if ($http_origin = "http://localhost:5173") {
        set $cors_origin "http://localhost:5173";
    }

    # Handle CORS preflight (OPTIONS)
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, X-XSRF-TOKEN, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Length 0;
        add_header Content-Type "text/plain charset=UTF-8";
        return 204;
    }

    # Add CORS headers to all responses
    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Accept, Authorization, Content-Type, X-XSRF-TOKEN, X-Requested-With" always;

    # Laravel API + Sanctum CSRF
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Storage files (uploaded media)
    location /storage/ {
        alias /var/www/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
