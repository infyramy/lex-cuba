server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CORS headers (origin resolved via cors-map.conf)
    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Accept, Authorization, Content-Type, X-XSRF-TOKEN, X-Requested-With" always;

    # Max upload size
    client_max_body_size 25M;

    # Handle CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Laravel API + Sanctum CSRF
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Storage files (uploaded media)
    location /storage/ {
        alias /var/www/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # PHP-FPM — localhost since nginx and php-fpm are in the same container
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
