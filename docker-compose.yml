# ============================================================================
# CORRAD Laravel CMS — Docker Compose (Dokploy / Bare Ubuntu / Any Docker Host)
# ============================================================================
#
# One repo → one `docker compose up` → everything running.
#
# Services:
#   db        — PostgreSQL 16 (data persisted in volume)
#   api       — Laravel PHP-FPM (backend logic)
#   api-web   — Nginx reverse proxy for PHP-FPM (serves /api/* and /storage/*)
#   admin     — Vue 3 SPA served by Nginx (admin panel)
#   queue     — Laravel queue worker (background jobs)
#   scheduler — Laravel task scheduler (cron replacement)
#
# Ports (configurable via .env):
#   API:   ${API_PORT:-8080}
#   Admin: ${ADMIN_PORT:-8081}
#   DB:    5432 (internal only, not exposed by default)
#
# ============================================================================
# Quick Start:
#   1. cp .env.production.example .env
#   2. Edit .env (set DB_PASSWORD, APP_URL, VITE_API_BASE_URL, domains)
#   3. docker compose up -d --build
#   4. Wait ~30s for auto-migration and seeding
#   5. Open http://localhost:8081 → admin panel
#   6. Login: admin@example.com / admin12345 (change immediately!)
# ============================================================================

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-corrad}
      POSTGRES_USER: ${DB_USERNAME:-corrad}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-corrad} -d ${DB_DATABASE:-corrad}"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Laravel API (PHP-FPM) ──────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - app-storage:/var/www/storage/app/public

  # ── Nginx for API (serves Laravel via FastCGI) ─────────────────────────────
  api-web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api]
    volumes:
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - app-storage:/var/www/storage/app/public:ro
    ports:
      - "${API_PORT:-8080}:80"

  # ── Admin Panel (Vue 3 SPA) ────────────────────────────────────────────────
  admin:
    build:
      context: .
      target: admin
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8081}:80"

  # ── Queue Worker (background jobs) ─────────────────────────────────────────
  queue:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - app-storage:/var/www/storage/app/public

  # ── Scheduler (cron replacement) ───────────────────────────────────────────
  scheduler:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]

volumes:
  pgdata:
  app-storage:
