# ============================================================================
# CORRAD Laravel CMS — Docker Compose (Dokploy / Bare Ubuntu / Any Docker Host)
# ============================================================================

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [appnet]
    environment:
      POSTGRES_DB: ${DB_DATABASE:-corrad}
      POSTGRES_USER: ${DB_USERNAME:-corrad}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-corrad} -d ${DB_DATABASE:-corrad}"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Laravel API (PHP-FPM) ──────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    networks: [appnet]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - app-storage:/var/www/storage/app/public

  # ── Nginx for API (serves Laravel via FastCGI) ─────────────────────────────
  api-web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [appnet]
    depends_on: [api]
    volumes:
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - app-storage:/var/www/storage/app/public:ro
    ports:
      - "${API_PORT:-8080}:80"

  # ── Admin Panel (Vue 3 SPA) ────────────────────────────────────────────────
  admin:
    build:
      context: .
      target: admin
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://lex-api.0w0.my}
    restart: unless-stopped
    networks: [appnet]
    ports:
      - "${ADMIN_PORT:-8081}:80"

  # ── Queue Worker (background jobs) ─────────────────────────────────────────
  queue:
    build:
      context: .
      target: api
    restart: unless-stopped
    networks: [appnet]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - app-storage:/var/www/storage/app/public

  # ── Scheduler (cron replacement) ───────────────────────────────────────────
  scheduler:
    build:
      context: .
      target: api
    restart: unless-stopped
    networks: [appnet]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
  app-storage:
